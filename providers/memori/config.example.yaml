run_name: memori-locomo-example

dataset:
  name: locomo
  max_items: 50

provider:
  name: memori
  config:
    postgres_url: postgresql://memori:${POSTGRES_PASSWORD}@localhost:5433/memori

answer_llm:
  model: gpt-4o
  api_key_env: OPENAI_API_KEY
  temperature: 0.0
  seed: 42

judge_llm:
  model: gpt-4o
  api_key_env: OPENAI_API_KEY
  temperature: 0.0
  seed: 42

concurrency: 1
seed: 42
output_dir: runs
