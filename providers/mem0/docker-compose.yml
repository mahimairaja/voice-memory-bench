# Self-hosted Postgres + pgvector for the Mem0 sidecar.
#
# Usage:
#   make providers-up-mem0
#   # or: docker compose -f providers/mem0/docker-compose.yml up -d
#
# Env:
#   POSTGRES_PASSWORD (required) — set in your shell or .env before running.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vbench-mem0-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mem0
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: mem0
    ports:
      - "5432:5432"
    volumes:
      - vbench_mem0_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mem0"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vbench_mem0_pgdata:
