# Minimal self-hosted stack for the Cognee adapter.
# Cognee is local-first: all storage is on the local filesystem.
# No Docker container is needed for storage.
#
# This file is provided as a reference for running a local Ollama LLM
# alongside Cognee for a fully air-gapped benchmark.
#
# Usage:
#   docker compose -f providers/cognee/docker-compose.yml up -d
#
# Then configure your run config with:
#   llm_provider: ollama
#   llm_model: llama3

version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: vmb-cognee-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # To pre-pull a model: docker exec vmb-cognee-ollama ollama pull llama3

volumes:
  ollama_data:
