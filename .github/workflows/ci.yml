name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go build / vet / test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  sidecar-mem0:
    name: Mem0 sidecar (syntax + lint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: uv sync sidecar
        working-directory: sidecars/mem0
        run: uv sync
      - name: Ruff
        working-directory: sidecars/mem0
        run: uv run ruff check vbench_mem0
