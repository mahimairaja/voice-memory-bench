# Graphiti + LoCoMo temporal benchmark run.
#
# This config exercises Graphiti's temporal retrieval mode.
#
# Prerequisites:
#   1. Start FalkorDB: docker compose -f providers/graphiti/docker-compose.yml up -d
#   2. Set env: export OPENAI_API_KEY=sk-...
#   3. Download dataset: uv run vmb datasets download locomo
#   4. Run: uv run vmb run examples/configs/graphiti-locomo-temporal.yaml

run_name: graphiti-locomo-temporal

dataset:
  name: locomo

provider:
  name: graphiti
  config:
    falkordb_url: redis://localhost:6379
    llm_provider: openai
    llm_model: gpt-4o-mini

answer_llm:
  model: gpt-4o
  api_key_env: OPENAI_API_KEY
  temperature: 0.0
  seed: 42

judge_llm:
  model: gpt-4o
  api_key_env: OPENAI_API_KEY
  temperature: 0.0
  seed: 42

concurrency: 1
seed: 42
output_dir: runs
