# Mem0 + LoCoMo voice-fitness benchmark.
#
# Prereqs:
#   export POSTGRES_PASSWORD=changeme
#   export OPENAI_API_KEY=sk-...
#   make providers-up-mem0
#   make sidecar-sync
#   make build
#   ./vbench datasets download locomo
#
# Then:
#   ./vbench eval --config examples/configs/mem0-locomo.yaml --max-items 2

run_name: mem0-locomo-voice-fitness

dataset:
  name: locomo
  # Uncomment to cap items from config; CLI --max-items overrides this.
  # max_items: 10

provider:
  name: mem0
  # Optional override. Default is `uv run vbench-mem0` in sidecars/mem0.
  # command: ["uv", "run", "vbench-mem0"]
  config:
    postgres_url: postgresql://mem0:${POSTGRES_PASSWORD}@localhost:5432/mem0
    llm_provider: openai
    llm_model: gpt-4o-mini
    collection_name: vbench_locomo
    # embedding_model: text-embedding-3-small

answer_llm:
  model: gpt-4o-mini
  api_key_env: OPENAI_API_KEY
  temperature: 0.0
  max_tokens: 256
  seed: 42

judge_llm:
  model: gpt-4o-mini
  api_key_env: OPENAI_API_KEY
  temperature: 0.0
  max_tokens: 128
  seed: 42

# MVP: measure at single and 4x concurrent load.
concurrency:
  - 1
  - 4

seed: 42
output_dir: runs
